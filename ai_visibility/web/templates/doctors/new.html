{% extends "base.html" %}
{% block title %}Novo Medico — AI Visibility{% endblock %}
{% block content %}

<div class="breadcrumbs text-sm mb-4">
    <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/doctors">Medicos</a></li>
        <li>Novo</li>
    </ul>
</div>

<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Cadastrar medico</h1>

    <div class="card bg-base-100 shadow-sm">
        <div class="card-body">
            <form method="POST" action="/doctors" class="space-y-5">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text">Nome completo *</span></label>
                    <input type="text" name="name" required placeholder="Dra. Maria Santos"
                        class="input input-bordered w-full" />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">Especialidade *</span></label>
                        <input type="text" name="specialty" required placeholder="Dermatologia"
                            class="input input-bordered w-full" />
                    </div>
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">Cidade *</span></label>
                        <input type="text" name="city" required placeholder="Campinas"
                            class="input input-bordered w-full" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">Estado</span></label>
                        <input type="text" name="state" placeholder="SP" maxlength="2"
                            class="input input-bordered w-full" />
                    </div>
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">Bairro</span></label>
                        <input type="text" name="neighborhood" placeholder="Cambui"
                            class="input input-bordered w-full" />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">CRM</span></label>
                        <input type="text" name="crm" placeholder="123456"
                            class="input input-bordered w-full" />
                    </div>
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text">UF do CRM</span></label>
                        <input type="text" name="crm_state" placeholder="SP" maxlength="2"
                            class="input input-bordered w-full" />
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="btn btn-primary w-full">
                        Cadastrar Medico
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
