{% if run.status in ('pending', 'running') %}
<!-- Polling continues -->
<div hx-get="/runs/{{ run.id }}/status" hx-trigger="every 3s" hx-swap="innerHTML" hx-target="#run-content">
    <div class="bg-white rounded-2xl shadow-sm border p-12 text-center">
        <svg class="animate-spin h-12 w-12 text-blue-600 mx-auto mb-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-xl font-semibold text-gray-700 mb-2">Análise em andamento...</h2>
        <p class="text-gray-500">{{ run.progress or 'Iniciando pipeline...' }}</p>
        <div class="mt-6 flex items-center justify-center gap-2">
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0s"></div>
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
    </div>
</div>

{% elif run.status == 'failed' %}
<!-- Error state — no more polling -->
<div class="bg-red-50 rounded-2xl border border-red-200 p-8">
    <div class="flex items-start gap-3">
        <svg class="w-6 h-6 text-red-500 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
        <div>
            <h2 class="text-lg font-semibold text-red-700">Erro na análise</h2>
            <p class="text-red-600 mt-2 text-sm">{{ run.error }}</p>
            <a href="/runs/new?doctor_id={{ run.doctor_id }}" class="mt-4 inline-block text-blue-600 hover:underline text-sm font-medium">
                Tentar novamente
            </a>
        </div>
    </div>
</div>

{% elif run.status == 'completed' %}
<!-- Full report — no more polling -->
{% include "_partials/report_embed.html" %}
{% endif %}
